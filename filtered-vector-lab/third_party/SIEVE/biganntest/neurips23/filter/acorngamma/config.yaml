random-filter-s:
    acorngamma:
      docker-tag: neurips23-filter-acorngamma
      module: neurips23.filter.acorngamma.acorngamma
      constructor: AcornGamma
      base-args: ["@metric"]
      run-groups:
        base:
          args: |
            [{"is_and": "True",
              "M": 16,
              "gamma": 4,
              "m_beta": 4,
              "bruteforce_selectivity_threshold": 0.05,
              "num_index_construction_threads": 3
            }]
          query-args: |
            [{"ef_search": 10},
            {"ef_search": 50},
            {"ef_search": 100}]

